<svg width="1080" height="1080" viewBox="0 0 1080 1080" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1080" y2="1080" gradientUnits="userSpaceOnUse">
      <stop stop-color="#151519"/>
      <stop offset="1" stop-color="#24242A"/>
    </linearGradient>
    <radialGradient id="light" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(600 620) rotate(90) scale(420 420)">
      <stop stop-color="#5A5A63"/>
      <stop offset="1" stop-color="#24242A" stop-opacity="0"/>
    </radialGradient>
    <filter id="blur" x="0" y="0" width="1080" height="1080" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feGaussianBlur stdDeviation="40"/>
    </filter>
  </defs>

  <rect width="1080" height="1080" fill="url(#bg)"/>
  <g filter="url(#blur)">
    <ellipse cx="600" cy="620" rx="260" ry="300" fill="url(#light)"/>
  </g>

  <!-- shoulders / shirt -->
  <path d="M325 944C355 815 437 734 540 734C643 734 725 815 755 944H325Z" fill="#D9D9D9"/>
  <path d="M470 744H610V864H470V744Z" fill="#D9D9D9"/>
  <path d="M470 744L540 810L610 744" stroke="#C9C9C9" stroke-width="3"/>

  <!-- neck -->
  <rect x="505" y="675" width="70" height="85" rx="25" fill="#AFAFAF"/>

  <!-- head -->
  <ellipse cx="540" cy="505" rx="175" ry="210" fill="#9F9F9F"/>

  <!-- hair -->
  <path d="M390 440C390 338 460 288 540 288C620 288 690 338 690 440C640 395 585 380 540 380C495 380 440 395 390 440Z" fill="#111111"/>
