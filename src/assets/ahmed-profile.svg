  <ellipse cx="365" cy="525" rx="20" ry="35" fill="#8E8E8E"/>
  <ellipse cx="715" cy="525" rx="20" ry="35" fill="#8E8E8E"/>

  <!-- glasses -->
  <rect x="422" y="468" width="106" height="78" rx="28" stroke="#111111" stroke-width="11"/>
  <rect x="552" y="468" width="106" height="78" rx="28" stroke="#111111" stroke-width="11"/>
  <path d="M528 505H552" stroke="#111111" stroke-width="11" stroke-linecap="round"/>
  <path d="M658 488L705 470" stroke="#111111" stroke-width="8" stroke-linecap="round"/>
  <path d="M422 488L375 470" stroke="#111111" stroke-width="8" stroke-linecap="round"/>

  <!-- eyes -->
  <ellipse cx="475" cy="507" rx="16" ry="10" fill="#2C2C2C"/>
  <ellipse cx="605" cy="507" rx="16" ry="10" fill="#2C2C2C"/>
  <circle cx="480" cy="505" r="4" fill="#EAEAEA"/>
  <circle cx="610" cy="505" r="4" fill="#EAEAEA"/>

  <!-- nose -->
